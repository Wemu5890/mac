name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flask openpyxl pyinstaller Pillow

    - name: Build Executable via PyInstaller (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --noconfirm --onefile --windowed --icon=logo.ico --add-data 'logo.ico;.' --add-data 'index.html;.' --add-data 'app.js;.' --add-data 'style.css;.' --name '教师信息更新工具' app.py

    - name: Build Executable via PyInstaller (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        pyinstaller --noconfirm --onedir --windowed --icon=logo.icns --add-data 'logo.ico:.' --add-data 'index.html:.' --add-data 'app.js:.' --add-data 'style.css:.' --name '教师信息更新工具' app.py
        cd dist
        zip -r app_mac.zip "教师信息更新工具.app"

    - name: Compile Inno Setup Installer (Windows)
      if: matrix.os == 'windows-latest'
      run: iscc "installer.iss"

    - name: Upload Release Assets (Windows)
      if: matrix.os == 'windows-latest'
      uses: softprops/action-gh-release@v1
      with:
        files: release/教师信息更新工具_Setup.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Upload Release Assets (macOS)
      if: matrix.os == 'macos-latest'
      uses: softprops/action-gh-release@v1
      with:
        files: dist/app_mac.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}